services:
  nginx:
#    profiles:
#      - prod
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - backend
#      - frontend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./frontend/public:/seed_src:ro
    env_file: ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles:
      - prod
    build: ./frontend
    env_file: ./frontend/.env
    depends_on:
      - backend

volumes:
  static_files:
  media_files:
  postgres_data:
